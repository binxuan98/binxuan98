<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">张斌轩 Binxuan Zhang</title>
  <desc id="desc">人工智能研究、职业教育与算力技术实践个人主页头图</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f" />
      <stop offset="0.58" stop-color="#0b1b2f" />
      <stop offset="1" stop-color="#102b3f" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#59d9ff" stop-opacity="0.34" />
      <stop offset="0.45" stop-color="#3f99c2" stop-opacity="0.1" />
      <stop offset="1" stop-color="#1d5b78" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect width="1200" height="360" rx="18" />
    </clipPath>
    <style>
      .route { stroke-dasharray: 8 14; animation: route-flow 9s linear infinite; }
      .route.slow { animation-duration: 14s; animation-direction: reverse; }
      .signal { animation: signal-pulse 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .signal.delay-a { animation-delay: -1.2s; }
      .signal.delay-b { animation-delay: -2.4s; }
      .scanner { animation: scanner 7s cubic-bezier(.4,0,.2,1) infinite; }
      @keyframes route-flow { to { stroke-dashoffset: -132; } }
      @keyframes signal-pulse {
        0%, 100% { opacity: .38; transform: scale(.78); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes scanner {
        0%, 12% { transform: translateX(-60px); opacity: 0; }
        25%, 72% { opacity: .7; }
        88%, 100% { transform: translateX(430px); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .route, .signal, .scanner { animation: none; }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="360" fill="url(#background)" />
    <circle cx="1025" cy="178" r="250" fill="url(#halo)" />

    <g opacity="0.15" fill="none" stroke="#9bdcf2">
      <path d="M725 45H1140" />
      <path d="M705 92H1165" />
      <path d="M745 268H1160" />
      <path d="M690 314H1125" />
    </g>

    <g fill="none" stroke-linecap="round">
      <path class="route" d="M704 294C790 263 812 185 886 174S1014 211 1168 84" stroke="#54c8e8" stroke-width="2" opacity="0.58" />
      <path class="route slow" d="M712 96C792 111 839 75 913 104S1010 214 1172 238" stroke="#d9b25f" stroke-width="2" opacity="0.5" />
      <path class="route" d="M770 336C837 276 846 241 930 238S1063 279 1195 167" stroke="#4b8fca" stroke-width="1.5" opacity="0.42" />
    </g>

    <g opacity="0.72" fill="none" stroke="#6fcbe6">
      <path d="M1003 82L1081 128L1080 220L1001 266L922 220L923 128Z" />
      <path d="M1002 117L1050 145L1050 202L1001 231L952 202L953 145Z" opacity="0.6" />
      <path d="M1002 151L1021 162L1021 186L1001 198L981 186L982 162Z" opacity="0.85" />
    </g>

    <g fill="#7ee4ff" filter="url(#softGlow)">
      <circle class="signal" cx="886" cy="174" r="4" />
      <circle class="signal delay-a" cx="1001" cy="174" r="5" />
      <circle class="signal delay-b" cx="1080" cy="220" r="4" />
    </g>
    <g fill="#e3bd68" filter="url(#softGlow)">
      <circle class="signal delay-b" cx="913" cy="104" r="4" />
      <circle class="signal delay-a" cx="1041" cy="206" r="3.5" />
    </g>

    <rect class="scanner" x="760" y="56" width="1.5" height="250" fill="#b4eeff" opacity="0.55" />

    <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
      <text x="72" y="105" fill="#86d9f0" font-size="17" font-weight="600">AI RESEARCH · EDUCATION · COMPUTING</text>
      <text x="70" y="182" fill="#f4f7fb" font-size="54" font-weight="700">张斌轩</text>
      <text x="72" y="226" fill="#cbd8e6" font-size="28" font-weight="400">Binxuan Zhang</text>
      <text x="72" y="286" fill="#92a9bc" font-size="18">连接人工智能研究、职业教育课堂与东数西算庆阳枢纽</text>
    </g>

    <g transform="translate(72 319)" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600">
      <circle cx="4" cy="-4" r="4" fill="#e3bd68" />
      <text x="18" y="0" fill="#9eb3c5">QINGYANG · GANSU · CHINA</text>
    </g>
  </g>
</svg>
